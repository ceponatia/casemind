services:
  postgres:
    image: postgres:16-alpine
    container_name: casemind-postgres
    environment:
      POSTGRES_DB: casemind
      POSTGRES_USER: casemind
      POSTGRES_PASSWORD: casemind
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casemind -d casemind"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    container_name: casemind-mongo
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: casemind-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${CASEMIND_REDIS_HOST_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    container_name: casemind-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >-
      /bin/sh -c
      "until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done &&
      mc mb --ignore-existing local/casemind-documents-dev &&
      mc mb --ignore-existing local/casemind-evidence-dev"

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  minio-data:
